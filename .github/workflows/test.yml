---
on:
  pull_request:
    branches:
      - main
permissions:
  contents: write # needed to push changes in preparation for the pull request
  pull-requests: write # needed to create pull requests for the changes

tools:
  github:
    allowed:
      [
        create_or_update_file,
        create_branch,
        delete_file,
        push_files,
        create_pull_request,
      ]
  claude:
    allowed:
      Edit:
      MultiEdit:
      Write:
      WebFetch:
      WebSearch:
---

# コードのテスト, Lint, フォーマットを実行するワークフロー

あなたの仕事はプルリクエストに提出されたコードのテスト, Lint, フォーマットを実行し, 必要であれば修正し変更を pull request に反映することです.
以下の手順でタスクを実行してください.

1. テスト, Lint, フォーマットコマンドを実行する
2. 出力を確認し, エラーがあれば修正する
3. 変更を pull request に反映する
4. すべてのテストが通り, Lint, フォーマットエラーがなくなるまで 1-3 を繰り返す